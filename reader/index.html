<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redwood Kinetic Reader</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <link rel="apple-touch-icon" href="../assets/logo-dark.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="./assets/index-DS9aVBEj.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C9Zf2WvO.css">
  </head>
  <body>
    <div id="app">
      <header class="reader-bar">
        <a class="identity identity-link" href="../" aria-label="Redwood Revival Press home">
          <img class="reader-logo" src="../assets/logo-light.png" alt="Redwood Revival Press" width="42" height="45" />
          <div>
            <div class="eyebrow">Redwood Revival Press</div>
            <h1>Kinetic Reader</h1>
          </div>
        </a>

        <button id="topControlsToggleButton" class="top-controls-toggle" type="button" disabled hidden aria-pressed="true">Show controls</button>

        <div class="loaders">
          <select id="hostedBookSelect" aria-label="Hosted readalong book" disabled hidden>
            <option>No hosted books</option>
          </select>
          <button id="loadHostedBookButton" type="button" disabled hidden>Load hosted book</button>
          <label class="file-picker">
            <input id="fileInput" type="file" accept=".epub,application/epub+zip" />
            Open EPUB
          </label>
        </div>
      </header>

      <main class="reader-shell">
        <section class="stage-wrap">
          <div class="stage-header">
            <div class="stage-info">
              <div id="bookMeta" class="book-meta">No book loaded</div>
              <div id="chapterControls" class="chapter-controls" hidden>
                <select id="chapterSelect" disabled></select>
                <button id="chapterToggleButton" type="button" disabled aria-pressed="false">Hide controls</button>
              </div>
            </div>
            <div id="status" class="status"></div>
          </div>

          <div class="canvas-frame">
            <canvas id="readerCanvas" aria-label="Kinetic readalong text"></canvas>
            <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite" hidden>
              <div class="loading-panel">
                <div id="loadingLabel" class="loading-label">Loading book</div>
                <div class="loading-track" aria-hidden="true">
                  <div id="loadingBar" class="loading-bar"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="transport">
            <div class="transport-main" aria-label="Playback navigation">
              <button id="previousSectionButton" class="transport-button" type="button" title="Previous section" aria-label="Previous section" disabled>
                <svg class="transport-svg transport-svg-filled chapter-skip-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <rect x="5" y="5" width="2" height="14" rx="1" />
                  <path d="M7 12l11 -7v14z" />
                </svg>
              </button>
              <button id="rewindButton" class="transport-button" type="button" title="Back 15 seconds" aria-label="Back 15 seconds" disabled>
                <svg class="transport-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                  <path d="M8 20h2a1 1 0 0 0 1 -1v-1a1 1 0 0 0 -1 -1h-2v-3h3" />
                  <path d="M15 18a6 6 0 1 0 0 -12h-11" />
                  <path d="M5 14v6" />
                  <path d="M7 9l-3 -3l3 -3" />
                </svg>
              </button>
              <button id="playbackToggleButton" class="transport-button primary" type="button" title="Play" aria-label="Play" aria-pressed="false" disabled>
                <svg class="transport-svg transport-svg-filled playback-icon playback-play" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <path d="M8 5.5v13l10 -6.5z" />
                </svg>
                <svg class="transport-svg transport-svg-filled playback-icon playback-pause" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <rect x="7" y="5" width="3.5" height="14" rx="0.8" />
                  <rect x="13.5" y="5" width="3.5" height="14" rx="0.8" />
                </svg>
              </button>
              <button id="forwardButton" class="transport-button" type="button" title="Forward 15 seconds" aria-label="Forward 15 seconds" disabled>
                <svg class="transport-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                  <path d="M17 9l3 -3l-3 -3" />
                  <path d="M9 18a6 6 0 1 1 0 -12h11" />
                  <path d="M16 20h2a1 1 0 0 0 1 -1v-1a1 1 0 0 0 -1 -1h-2v-3h3" />
                  <path d="M13 14v6" />
                </svg>
              </button>
              <button id="nextSectionButton" class="transport-button" type="button" title="Next section" aria-label="Next section" disabled>
                <svg class="transport-svg transport-svg-filled chapter-skip-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <rect x="17" y="5" width="2" height="14" rx="1" />
                  <path d="M17 12l-11 -7v14z" />
                </svg>
              </button>
            </div>
            <label class="scrub-control">
              <span id="currentTime">0:00</span>
              <input id="scrubInput" type="range" min="0" max="0" step="0.1" value="0" aria-label="Playback position" disabled />
              <span id="duration">0:00</span>
            </label>
            <div class="transport-settings">
              <label class="range-control">
                Speed
                <input id="speedInput" type="range" min="0.7" max="3" step="0.05" value="1" />
                <span id="speedLabel">1.00x</span>
              </label>
              <label>
                Mode
                <select id="modeSelect">
                  <option value="lens">Lens</option>
                  <option value="line">Line lock</option>
                  <option value="classic">Classic</option>
                </select>
              </label>
              <button id="advancedOptionsButton" type="button" aria-expanded="false" aria-controls="advancedControls">Advanced mode options</button>
              <div id="advancedControls" class="advanced-controls" hidden>
                <label class="range-control">
                  Magnify
                  <input id="magnificationInput" type="range" min="1" max="1.8" step="0.05" value="1.4" />
                  <span id="magnificationLabel">1.40x</span>
                </label>
                <label class="range-control">
                  Focus
                  <input id="focusInput" type="range" min="0" max="1" step="0.05" value="0.5" />
                  <span id="focusLabel">50%</span>
                </label>
                <label class="range-control">
                  Fade/line
                  <input id="lineFadeInput" type="range" min="0" max="1" step="0.05" value="1" />
                  <span id="lineFadeLabel">100%</span>
                </label>
              </div>
            </div>
          </div>

          <audio id="audio" preload="metadata"></audio>
        </section>
      </main>
    </div>
  </body>
</html>
