.mode-dev .feedback{display:none}

<script src="https://cdn.jsdelivr.net/npm/mark.js@8.11.1/dist/mark.min.js"></script>
<script>
const DATA = window.RHETORIC_TRANSLATION_DATA;
const params = new URLSearchParams(location.search);
const MODE = params.get("mode") === "dev" || params.get("dev") === "1" ? "dev" : "public";
document.body.className = MODE === "dev" ? "mode-dev" : "mode-public";
const COLUMNS = {
  source: "Source",
  sourceTransliteration: "Transliterated Greek",
  draftLiteral: "Draft literal",
  finalLiteral: "Literal translation",
  adapted: "Improved translation",
  modernized: "Modernization",
  canonical: DATA.book.canonicalLabel || "Freese 1926"
};
const COLUMN_ALIASES = {
  source: "source", greek: "source", original: "source",
  sourcetransliteration: "sourceTransliteration", transliteration: "sourceTransliteration", transliterated: "sourceTransliteration", transliteratedgreek: "sourceTransliteration", translit: "sourceTransliteration", latin: "sourceTransliteration",
  draft: "draftLiteral", draftliteral: "draftLiteral", drafttranslation: "draftLiteral",
  literal: "finalLiteral", finalliteral: "finalLiteral", wordforword: "finalLiteral", wordforwordtranslation: "finalLiteral",
  adapted: "adapted", improved: "adapted", improvedtranslation: "adapted",
  modernized: "modernized", modernization: "modernized", modern: "modernized",
  canonical: "canonical", freese: "canonical", freese1926: "canonical"
};
function allowedColumnKeys() {
  return (MODE === "dev" ? DATA.defaults.devColumns : DATA.defaults.publicColumns).filter(key => COLUMNS[key]);
}
function normalizeColumnToken(token) {
  return String(token || "").trim().toLowerCase().replace(/[^a-z0-9]/g, "");
}
function columnsFromUrl() {
  const raw = params.get("cols") || params.get("columns") || "";
  if (!raw.trim()) return [];
  const allowed = new Set(allowedColumnKeys());
  const out = [];
  raw.split(/[,+|;\s]+/).forEach(part => {
    const key = COLUMN_ALIASES[normalizeColumnToken(part)];
    if (key && allowed.has(key) && !out.includes(key)) out.push(key);
  });
  return out;
}
const DEFAULT_COLUMN_ORDER = allowedColumnKeys();
const URL_COLUMNS = columnsFromUrl();
let columnOrder = URL_COLUMNS.length
  ? [...URL_COLUMNS, ...DEFAULT_COLUMN_ORDER.filter(key => !URL_COLUMNS.includes(key))]
  : [...DEFAULT_COLUMN_ORDER];
let visibleColumns = new Set(URL_COLUMNS.length ? URL_COLUMNS : DEFAULT_COLUMN_ORDER);
let passageEls = [];
let matches = [];
let matchIndex = -1;
let draggedColumn = null;
let suppressToggleClick = false;
const TOOLS_STATE_KEY = "translation_explorer.tools_collapsed.v1";
const ALL_BOOKS = "all";
const BOOKS = Array.isArray(DATA.books) && DATA.books.length
  ? DATA.books
  : [...new Set(DATA.chapters.map(ch => ch.bookNumber).filter(Boolean))]
      .map(number => ({id: `book-${number}`, number, label: `Book ${number}`}));
let selectedBook = bookFromUrl();
const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const inlineTokenRe = /\{\{fnref:\d+:(\d+)\}\}|<\/?(?:em|strong)>/g;
function formatInlineText(text) {
  let out = "", last = 0;
  for (const m of String(text || "").matchAll(inlineTokenRe)) {
    out += escapeHtml(String(text || "").slice(last, m.index));
    const token = m[0].toLowerCase();
    if (m[1]) out += `<sup>${escapeHtml(m[1])}</sup>`;
    else if (token === "<em>" || token === "</em>" || token === "<strong>" || token === "</strong>") out += token;
    last = m.index + m[0].length;
  }
  return out + escapeHtml(String(text || "").slice(last));
}
const greekRe = /[Ͱ-Ͽἀ-῿̀-ͯ]+/g;
function tokenizeGreek(text) {
  let out = "", last = 0;
  for (const m of String(text || "").matchAll(greekRe)) {
    out += escapeHtml(text.slice(last, m.index));
    const w = m[0];
    if (w.length >= 2 && w.replace(/[̀-ͯ]/g, "").length >= 2) out += `<span class="grk" tabindex="0" data-w="${escapeHtml(w)}">${escapeHtml(w)}</span>`;
    else out += escapeHtml(w);
    last = m.index + w.length;
  }
  return out + escapeHtml(String(text || "").slice(last));
}
const transliterationWordRe = /[A-Za-zēōĒŌ]+/g;
function tokenizeTransliteration(source, text) {
  const greekWords = [...String(source || "").matchAll(greekRe)].map(m => m[0]);
  let out = "", last = 0, i = 0;
  for (const m of String(text || "").matchAll(transliterationWordRe)) {
    out += escapeHtml(text.slice(last, m.index));
    const w = m[0];
    const greek = greekWords[i++];
    if (greek && greek.length >= 2 && greek.replace(/[̀-ͯ]/g, "").length >= 2) out += `<span class="grk" tabindex="0" data-w="${escapeHtml(greek)}">${escapeHtml(w)}</span>`;
    else out += escapeHtml(w);
    last = m.index + w.length;
  }
  return out + escapeHtml(String(text || "").slice(last));
}
function render() {
  const app = document.getElementById("app");
  const chapters = visibleChapters();
  if (!chapters.length) { app.innerHTML = `<div class="empty">No modernized passages available.</div>`; return; }
  app.innerHTML = chapters.map((ch, ci) => `
    <section class="chapter collapsed" id="${escapeHtml(ch.id)}">
      <div class="chapter-head">
        <div class="chapter-num">${escapeHtml(chapterDisplayLabel(ch, ci))}</div>
        <h2>${escapeHtml(ch.title)}</h2>
        <button class="chapter-toggle" aria-expanded="false" aria-controls="${escapeHtml(ch.id)}-body" aria-label="Expand chapter" title="Expand chapter">+</button>
      </div>
      <div class="chapter-body" id="${escapeHtml(ch.id)}-body">${ch.passages.map(p => renderPassage(p, ch)).join("")}</div>
    </section>`).join("");
  passageEls = [...document.querySelectorAll(".passage")];
  syncColumns();
  updateDevMeta();
}
function visibleChapters() {
  if (selectedBook === ALL_BOOKS) return DATA.chapters;
  const selected = BOOKS.find(book => book.id === selectedBook || book.number === selectedBook);
  const number = selected?.number || selectedBook.replace(/^book-/, "");
  return DATA.chapters.filter(ch => String(ch.bookNumber || "") === String(number));
}
function chapterDisplayLabel(ch, index) {
  const chapter = ch.chapterNumber || ch.sectionNumber || index + 1;
  if (selectedBook === ALL_BOOKS && ch.bookNumber) return `Book ${ch.bookNumber} · Chapter ${chapter}`;
  return `Chapter ${chapter}`;
}
function orderedVisibleColumns() {
  return columnOrder.filter(key => visibleColumns.has(key));
}
function renderPassage(p, chapter) {
  const cols = columnOrder.map(key => {
    const val = p[key] || "";
    const body = key === "source" ? tokenizeGreek(val) : key === "sourceTransliteration" ? tokenizeTransliteration(p.source, val) : formatInlineText(val);
    const quality = MODE === "dev" && key === "modernized" && p.quality?.modernization
      ? `<div class="quality">${qualityPills(p.quality.modernization)}</div>` : "";
    return `<div class="col ${key}" data-col="${key}"><div class="label">${COLUMNS[key]}</div><div class="text">${body || "<em>not available</em>"}</div>${columnFootnotes(p, key)}${quality}</div>`;
  }).join("");
  return `<article class="passage" id="${escapeHtml(p.id)}" data-passage="${escapeHtml(p.id)}" data-search="${escapeHtml(searchTextFor(p, chapter))}">
    <div class="passage-head"><div class="pid">${escapeHtml(p.id)} · page ${escapeHtml(p.page)}</div></div>
    <div class="grid">${cols}</div>${feedbackHtml(p)}
  </article>`;
}
function columnFootnotes(p, key) {
  const notes = key === "adapted" ? p.adaptedFootnotes : key === "modernized" ? p.modernizedFootnotes : [];
  if (!notes || !notes.length) return "";
  return `<div class="footnotes">${notes.map(fn => `<div><span class="fn-num">${escapeHtml(fn.num)}</span>${escapeHtml(fn.text || "")}</div>`).join("")}</div>`;
}
function searchTextFor(p, chapter) {
  const keys = MODE === "dev" ? Object.keys(COLUMNS) : DATA.defaults.publicColumns;
  const footnotes = (p.footnotes || []).map(fn => fn.text || "").join(" ");
  return [chapter.chapterLabel, chapter.title, p.id, ...keys.map(key => p[key] || ""), footnotes].join(" ").toLowerCase();
}
function qualityPills(j) {
  return [
    ["verdict", j.verdict],
    ["idea", j.idea_accuracy_score],
    ["style", j.style_quality_score],
    ["clear", j.presentation_clarity_score]
  ].map(([k,v]) => `<span class="pill">${escapeHtml(k)} ${escapeHtml(v ?? "")}</span>`).join("");
}
function feedbackHtml(p) {
  return `<details class="feedback" data-feedback="${escapeHtml(p.id)}">
    <summary>Feedback</summary>
    <div class="feedback-body">
      <button data-vote="up" aria-label="Thumbs up">&#128077;</button>
      <button data-vote="down" aria-label="Thumbs down">&#128078;</button>
      <textarea placeholder="Note" aria-label="Feedback note"></textarea>
      <button class="send">Send</button>
      <span class="feedback-status" role="status" aria-live="polite"></span>
    </div>
  </details>`;
}
function feedbackConfig() {
  const cfg = DATA.feedback || {};
  if (cfg.provider !== "supabase" || !cfg.supabaseUrl || !cfg.supabaseAnonKey) return null;
  return {
    url: String(cfg.supabaseUrl).replace(/\/$/, ""),
    key: cfg.supabaseAnonKey,
    table: cfg.table || "translation_feedback"
  };
}
async function submitFeedback(box) {
  const cfg = feedbackConfig();
  const status = box.querySelector(".feedback-status");
  const send = box.querySelector(".send");
  if (!cfg) {
    status.textContent = "Not configured";
    return;
  }
  const p = allPassages().find(x => x.id === box.dataset.feedback);
  const chapter = DATA.chapters.find(ch => ch.passages.some(x => x.id === box.dataset.feedback));
  const voteValue = box.dataset.vote || "unspecified";
  const note = box.querySelector("textarea").value.trim();
  const version = DATA.version || {};
  const payload = {
    book: DATA.book.title,
    passage_id: p.id,
    page_number: p.page,
    block_index: p.block,
    vote: voteValue,
    note,
    website_version: version.websiteVersion || "",
    feedback_round: version.feedbackRound || "",
    content_hash: version.contentHash || "",
    site_revision: version.siteRevision || "",
    generator_revision: version.generatorRevision || "",
    build_generated_at: version.generatedAt || DATA.generatedAt || null,
    url: location.href,
    user_agent: navigator.userAgent,
    context: {
      version,
      section_title: chapter?.title || "",
      chapter_title: chapter?.title || "",
      chapter_label: chapter?.chapterLabel || "",
      book_number: chapter?.bookNumber || "",
      chapter_number: chapter?.chapterNumber || "",
      visible_columns: orderedVisibleColumns(),
      source: p.source || "",
      source_transliteration: p.sourceTransliteration || "",
      literal: p.finalLiteral || "",
      adapted: p.adapted || "",
      modernized: p.modernized || "",
      freese_1926: p.canonical || ""
    }
  };
  status.textContent = "Saving";
  send.disabled = true;
  try {
    const response = await fetch(`${cfg.url}/rest/v1/${encodeURIComponent(cfg.table)}`, {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "apikey": cfg.key,
        "authorization": `Bearer ${cfg.key}`,
        "prefer": "return=minimal"
      },
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    status.textContent = "Saved";
    box.querySelector("textarea").value = "";
  } catch (err) {
    status.textContent = "Save failed";
    console.error("Feedback save failed", err);
  } finally {
    send.disabled = false;
  }
}
function allPassages() {
  return DATA.chapters.flatMap(ch => ch.passages);
}
function bookFromUrl() {
  const raw = params.get("book") || ALL_BOOKS;
  if (raw === ALL_BOOKS) return ALL_BOOKS;
  const normalized = raw.toLowerCase().replace(/^book-/, "");
  const match = BOOKS.find(book => (
    book.id === raw || String(book.number).toLowerCase() === normalized
  ));
  return match ? match.id : ALL_BOOKS;
}
function setupBookSelect() {
  const select = document.getElementById("bookSelect");
  select.innerHTML = [
    `<option value="${ALL_BOOKS}">All books</option>`,
    ...BOOKS.map(book => `<option value="${escapeHtml(book.id)}">${escapeHtml(book.label)}</option>`)
  ].join("");
  select.value = selectedBook;
  select.addEventListener("change", () => {
    selectedBook = select.value || ALL_BOOKS;
    updateBookUrl();
    render();
    const input = document.getElementById("search");
    if (input?.value.trim()) runSearch(0, false);
  });
}
function updateBookUrl() {
  const url = new URL(location.href);
  if (selectedBook === ALL_BOOKS) url.searchParams.delete("book");
  else {
    const book = BOOKS.find(item => item.id === selectedBook);
    url.searchParams.set("book", book?.number || selectedBook);
  }
  history.replaceState(null, "", url);
}
function columnUrlValue() {
  return orderedVisibleColumns().join(",");
}
function updateColumnUrl() {
  const url = new URL(location.href);
  const visible = orderedVisibleColumns();
  const defaultVisible = DEFAULT_COLUMN_ORDER.length === visible.length && DEFAULT_COLUMN_ORDER.every((key, i) => key === visible[i]);
  const defaultOrder = DEFAULT_COLUMN_ORDER.length === columnOrder.length && DEFAULT_COLUMN_ORDER.every((key, i) => key === columnOrder[i]);
  if (defaultVisible && defaultOrder) url.searchParams.delete("cols");
  else url.searchParams.set("cols", columnUrlValue());
  url.searchParams.delete("columns");
  history.replaceState(null, "", url);
}
function moveColumn(source, target) {
  if (!source || !target || source === target) return false;
  const from = columnOrder.indexOf(source);
  const to = columnOrder.indexOf(target);
  if (from < 0 || to < 0) return false;
  const [item] = columnOrder.splice(from, 1);
  columnOrder.splice(to, 0, item);
  return true;
}
function renderColumnControls() {
  document.getElementById("devControls").innerHTML = columnOrder.map(key => `<button class="toggle" data-col="${key}" draggable="true" aria-pressed="${visibleColumns.has(key) ? "true" : "false"}" title="Drag to reorder columns">${COLUMNS[key]}</button>`).join("");
}
function syncColumns() {
  const visible = orderedVisibleColumns();
  const count = visible.length || 1;
  document.querySelectorAll(".grid").forEach(g => g.style.setProperty("--cols", count));
  document.querySelectorAll(".col[data-col]").forEach(el => {
    const order = columnOrder.indexOf(el.dataset.col);
    el.style.order = order < 0 ? 999 : order;
    el.classList.toggle("hidden", !visibleColumns.has(el.dataset.col));
  });
  document.querySelectorAll(".toggle").forEach(btn => {
    const visible = visibleColumns.has(btn.dataset.col);
    btn.classList.toggle("off", !visible);
    btn.setAttribute("aria-pressed", visible ? "true" : "false");
  });
  const input = document.getElementById("search");
  if (input?.value.trim()) runSearch(0, false);
}
function setupColumnControls() {
  const controls = document.getElementById("devControls");
  renderColumnControls();
  controls.addEventListener("click", ev => {
    const btn = ev.target.closest(".toggle"); if (!btn || suppressToggleClick) return;
    const key = btn.dataset.col;
    if (visibleColumns.has(key)) {
      if (visibleColumns.size <= 1) return;
      visibleColumns.delete(key);
    } else {
      visibleColumns.add(key);
    }
    syncColumns();
    updateColumnUrl();
  });
  controls.addEventListener("dragstart", ev => {
    const btn = ev.target.closest(".toggle"); if (!btn) return;
    draggedColumn = btn.dataset.col;
    btn.classList.add("dragging");
    ev.dataTransfer.effectAllowed = "move";
    ev.dataTransfer.setData("text/plain", draggedColumn);
  });
  controls.addEventListener("dragover", ev => {
    const btn = ev.target.closest(".toggle");
    if (!btn || !draggedColumn || btn.dataset.col === draggedColumn) return;
    ev.preventDefault();
    btn.classList.add("drop-target");
  });
  controls.addEventListener("dragleave", ev => {
    const btn = ev.target.closest(".toggle");
    if (btn) btn.classList.remove("drop-target");
  });
  controls.addEventListener("drop", ev => {
    const btn = ev.target.closest(".toggle");
    if (!btn || !draggedColumn) return;
    ev.preventDefault();
    document.querySelectorAll(".drop-target").forEach(el => el.classList.remove("drop-target"));
    if (moveColumn(draggedColumn, btn.dataset.col)) {
      suppressToggleClick = true;
      renderColumnControls();
      syncColumns();
      updateColumnUrl();
      setTimeout(() => { suppressToggleClick = false; }, 0);
    }
  });
  controls.addEventListener("dragend", () => {
    draggedColumn = null;
    document.querySelectorAll(".dragging,.drop-target").forEach(el => el.classList.remove("dragging", "drop-target"));
  });
  updateDevMeta();
}
function updateDevMeta() {
  const visiblePassageCount = visibleChapters().flatMap(ch => ch.passages).length;
  const totalPassageCount = allPassages().length;
  document.getElementById("devMeta").textContent = `Dev mode · ${visiblePassageCount}/${totalPassageCount} passages · ${Object.keys(DATA.lexicon || {}).length} Greek hover entries`;
}
function runSearch(step = 0, navigate = true) {
  const q = document.getElementById("search").value.trim().toLowerCase();
  setToolsSearching(Boolean(q));
  clearSearchHighlights(() => {
    passageEls.forEach(el => el.classList.remove("search-active"));
    if (!q) { matches = []; matchIndex = -1; updateMatchCount(); return; }
    if (typeof window.Mark !== "function") {
      matches = passageEls.filter(el => el.dataset.search.includes(q));
      if (!matches.length) { matchIndex = -1; updateMatchCount(); return; }
      matchIndex = step === 0 ? 0 : (matchIndex + step + matches.length) % matches.length;
      if (navigate) activateMatch();
      else updateMatchCount();
      return;
    }
    applySearchHighlights(q, () => {
      matches = collectHighlightedPassages();
      if (!matches.length) { matchIndex = -1; updateMatchCount(); return; }
      matchIndex = step === 0 ? 0 : (matchIndex + step + matches.length) % matches.length;
      if (navigate) activateMatch();
      else updateMatchCount();
    });
  });
}
function activateMatch() {
  passageEls.forEach(el => el.classList.remove("search-active"));
  if (matchIndex < 0 || !matches[matchIndex]) { updateMatchCount(); return; }
  const el = matches[matchIndex];
  setChapterCollapsed(el.closest(".chapter"), false);
  el.classList.add("search-active");
  el.scrollIntoView({block:"center", behavior:"smooth"});
  const url = new URL(location.href);
  url.hash = el.id;
  history.replaceState(null, "", url);
  updateMatchCount();
}
function updateMatchCount() {
  document.getElementById("matchCount").textContent = matches.length ? `${matchIndex + 1} / ${matches.length}` : "0 / 0";
  document.getElementById("prevMatch").disabled = !matches.length;
  document.getElementById("nextMatch").disabled = !matches.length;
}
function setupSearch() {
  const input = document.getElementById("search");
  syncToolsStickyTop();
  input.addEventListener("input", () => runSearch(0, false));
  input.addEventListener("keydown", ev => {
    if (ev.key === "Enter") { ev.preventDefault(); runSearch(ev.shiftKey ? -1 : 1, true); }
  });
  document.getElementById("prevMatch").addEventListener("click", () => runSearch(-1, true));
  document.getElementById("nextMatch").addEventListener("click", () => runSearch(1, true));
  window.addEventListener("resize", syncToolsStickyTop);
  updateMatchCount();
}
function syncToolsStickyTop() {
  const topbar = document.querySelector(".topbar");
  document.documentElement.style.setProperty("--tools-sticky-top", `${topbar?.offsetHeight || 0}px`);
}
function setToolsSearching(active) {
  syncToolsStickyTop();
  document.getElementById("tools").classList.toggle("searching", active);
}
function storedToolsCollapsed() {
  try {
    const value = localStorage.getItem(TOOLS_STATE_KEY);
    if (value === "1") return true;
    if (value === "0") return false;
  } catch (err) {}
  return window.matchMedia("(max-width: 980px)").matches;
}
function setToolsCollapsed(collapsed, persist = true) {
  const tools = document.getElementById("tools");
  const hide = document.getElementById("toolsHide");
  const show = document.getElementById("toolsShow");
  tools.classList.toggle("collapsed", collapsed);
  hide.setAttribute("aria-expanded", collapsed ? "false" : "true");
  show.setAttribute("aria-expanded", collapsed ? "false" : "true");
  if (persist) {
    try { localStorage.setItem(TOOLS_STATE_KEY, collapsed ? "1" : "0"); } catch (err) {}
  }
}
function setupToolsToggle() {
  const hide = document.getElementById("toolsHide");
  const show = document.getElementById("toolsShow");
  setToolsCollapsed(storedToolsCollapsed(), false);
  hide.addEventListener("click", () => {
    setToolsCollapsed(true);
    try { show.focus({preventScroll:true}); } catch (err) { show.focus(); }
  });
  show.addEventListener("click", () => setToolsCollapsed(false));
}
function clearSearchHighlights(done = () => {}) {
  if (typeof window.Mark !== "function") { done(); return; }
  new Mark(document.querySelector("main")).unmark({
    element: "mark",
    className: "search-hit",
    done
  });
}
function applySearchHighlights(q, done) {
  new Mark(document.querySelector("main")).mark(q, {
    element: "mark",
    className: "search-hit",
    separateWordSearch: false,
    acrossElements: true,
    exclude: [".chapter-head *", ".pid", ".label", ".quality *", ".feedback *", ".hidden *", "#tooltip *"],
    done
  });
}
function collectHighlightedPassages() {
  const seen = new Set();
  const out = [];
  document.querySelectorAll("mark.search-hit").forEach(mark => {
    const passage = mark.closest(".passage");
    if (passage && !seen.has(passage)) {
      seen.add(passage);
      out.push(passage);
    }
  });
  return out;
}
function setChapterCollapsed(chapter, collapsed) {
  if (!chapter) return;
  chapter.classList.toggle("collapsed", collapsed);
  const button = chapter.querySelector(".chapter-toggle");
  if (!button) return;
  button.textContent = collapsed ? "+" : "−";
  button.setAttribute("aria-expanded", collapsed ? "false" : "true");
  button.setAttribute("aria-label", collapsed ? "Expand chapter" : "Collapse chapter");
  button.setAttribute("title", collapsed ? "Expand chapter" : "Collapse chapter");
}
function showTip(word, target) {
  const entry = DATA.lexicon[word];
  const tip = document.getElementById("tooltip");
  if (!entry) return;
  tip.innerHTML = `<div class="hw">${escapeHtml(entry.headword || word)}</div><div class="pos">${escapeHtml(entry.partOfSpeech || "Greek")}${entry.short ? " · " + escapeHtml(entry.short) : ""}</div><div class="def">${escapeHtml(entry.definition || "")}</div>`;
  tip.style.display = "block";
  const r = target.getBoundingClientRect();
  const pad = 12;
  let x = r.left, y = r.bottom + pad;
  tip.style.left = Math.min(window.innerWidth - tip.offsetWidth - pad, Math.max(pad, x)) + "px";
  tip.style.top = Math.min(window.innerHeight - tip.offsetHeight - pad, Math.max(pad, y)) + "px";
}
document.addEventListener("mouseover", ev => { const el = ev.target.closest(".grk"); if (el) showTip(el.dataset.w, el); });
document.addEventListener("focusin", ev => { const el = ev.target.closest(".grk"); if (el) showTip(el.dataset.w, el); });
document.addEventListener("mouseout", ev => { if (ev.target.closest(".grk")) document.getElementById("tooltip").style.display = "none"; });
document.addEventListener("focusout", ev => { if (ev.target.closest(".grk")) document.getElementById("tooltip").style.display = "none"; });
document.addEventListener("click", ev => {
  const chapterButton = ev.target.closest(".chapter-toggle");
  if (chapterButton) {
    const chapter = chapterButton.closest(".chapter");
    setChapterCollapsed(chapter, !chapter.classList.contains("collapsed"));
    return;
  }
  const vote = ev.target.closest("[data-vote]");
  if (vote) {
    const box = vote.closest(".feedback");
    box.querySelectorAll("[data-vote]").forEach(b => b.classList.toggle("active", b === vote));
    box.dataset.vote = vote.dataset.vote;
  }
  const send = ev.target.closest(".send");
  if (send) {
    const box = send.closest(".feedback");
    submitFeedback(box);
  }
});
setupToolsToggle();
setupBookSelect();
setupColumnControls();
render();
setupSearch();
</script>
</body>
